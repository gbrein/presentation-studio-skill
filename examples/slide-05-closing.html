<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Slide 05 - Closing</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --color-dark: #0D2B33; --color-dark-muted: #2A5561;
    --color-light: #FFFFFF; --color-accent: #028090;
    --color-muted: #7AABB5;
    --font-heading: 'Source Serif 4', Georgia, serif;
    --font-body: 'Source Sans 3', Calibri, sans-serif;
  }
  html, body { width: 1280px; height: 720px; overflow: hidden; font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
  .slide { width: 1280px; height: 720px; position: relative; display: flex; flex-direction: column; background: var(--color-dark); }
  .slide-body { flex: 1; padding: 0 80px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
</style>
</head>
<body>
  <div class="slide">
    <div class="slide-body">
      <div style="width: 48px; height: 3px; background: var(--color-accent); margin-bottom: 32px;"></div>
      <h2 style="font-family: var(--font-heading); font-size: 32px; font-weight: 700; color: var(--color-light); line-height: 1.3;">
        Obrigado
      </h2>
      <p style="font-size: 16px; color: var(--color-muted); margin-top: 16px; max-width: 600px; line-height: 1.6;">
        A transição energética não é mais uma questão de se, mas de quando e a que velocidade.
        Os dados indicam que a janela de oportunidade para investimento está nos próximos 3 anos.
      </p>
      <div style="margin-top: 48px; font-size: 13px; color: var(--color-muted);">
        <div>contato@analise-energia.com</div>
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Slide 01 - Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --color-dark: #0D2B33; --color-dark-muted: #2A5561;
    --color-light: #FFFFFF; --color-light-muted: #F0F7F9;
    --color-accent: #028090; --color-accent-light: #E0F4F7;
    --color-accent-dark: #016670; --color-positive: #2F855A;
    --color-negative: #C53030; --color-muted: #7AABB5;
    --color-border: #C8DFE4; --color-alt-row: #F5FAFB;
    --font-heading: 'Source Serif 4', Georgia, serif;
    --font-body: 'Source Sans 3', Calibri, sans-serif;
  }
  html, body { width: 1280px; height: 720px; overflow: hidden; font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
  .slide { width: 1280px; height: 720px; position: relative; display: flex; flex-direction: column; background: var(--color-dark); }
  .slide-body { flex: 1; padding: 0 80px; display: flex; flex-direction: column; justify-content: center; }
</style>
</head>
<body>
  <div class="slide">
    <div class="slide-body">
      <div style="width: 60px; height: 3px; background: var(--color-accent); margin-bottom: 32px;"></div>
      <h1 style="font-family: var(--font-heading); font-size: 44px; font-weight: 700; color: var(--color-light); line-height: 1.2; max-width: 900px;">
        Panorama do Mercado Global de Energia Renovável
      </h1>
      <p style="font-size: 18px; color: var(--color-muted); margin-top: 16px; max-width: 700px; line-height: 1.5;">
        Tendências, investimentos e oportunidades para o próximo ciclo de crescimento
      </p>
      <div style="margin-top: 48px; font-size: 13px; color: var(--color-muted);">
        <span>Análise Setorial</span>
        <span style="margin: 0 12px; opacity: 0.4;">|</span>
        <span>Dados Públicos IRENA / IEA</span>
        <span style="margin: 0 12px; opacity: 0.4;">|</span>
        <span>Março 2026</span>
      </div>
    </div>
  </div>
</body>
</html>
